<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Petty Cash Cloud Terminal</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNFH8B5awZESIKXvEttWtpx8-skDqj9zU",
    authDomain: "pettycash-2b1f6.firebaseapp.com",
    databaseURL: "https://pettycash-2b1f6-default-rtdb.firebaseio.com",
    projectId: "pettycash-2b1f6",
    storageBucket: "pettycash-2b1f6.firebasestorage.app",
    messagingSenderId: "99097936677",
    appId: "1:99097936677:web:2d7c3d14182ff30ed050cc",
    measurementId: "G-6L5XNFMLMH"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const transRef = ref(db, 'transactions');
  const countRef = ref(db, 'counters');

  window.transactions = [];
  window.counters = { "HA": 1, "JA": 1 };

  onValue(countRef, (snapshot) => {
    if (snapshot.exists()) { window.counters = snapshot.val(); }
  });

  onValue(transRef, (snapshot) => {
    const data = snapshot.val();
    window.transactions = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
    renderLedger();
  });

  window.saveToFirebase = async function(voucher) {
    const prefix = companyProfiles[voucher.company].prefix;
    await push(transRef, voucher);
    window.counters[prefix]++;
    await set(countRef, window.counters);
  };

  // GLOBAL ACTIONS
  window.applyBulkAction = async function(actionType) {
    const selectedIds = Array.from(document.querySelectorAll('.row-select:checked')).map(cb => cb.value);
    if (!selectedIds.length) return alert("Select vouchers first.");

    if (actionType === 'delete') {
      if (!confirm(`Permanently delete ${selectedIds.length} records?`)) return;
      for (let id of selectedIds) await remove(ref(db, `transactions/${id}`));
    } else if (actionType === 'csv') {
      exportToCSV(selectedIds);
    } else {
      for (let id of selectedIds) await update(ref(db, `transactions/${id}`), { status: actionType });
    }
    document.getElementById("selectAll").checked = false;
  };

  // CSV Export Logic
  function exportToCSV(ids) {
    const selectedData = window.transactions.filter(t => ids.includes(t.id));
    let csvContent = "data:text/csv;charset=utf-8,Voucher No,Date,Company,Total,Status,Items\n";
    
    selectedData.forEach(t => {
      const itemsStr = t.items.map(i => `${i.desc}(${i.amount})`).join(' | ');
      csvContent += `${t.docNo},${t.date},"${t.company}",${t.total},${t.status},"${itemsStr}"\n`;
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `PettyCash_Export_${new Date().toLocaleDateString()}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>

<style>
body{font-family: 'Segoe UI', Arial, sans-serif; background:#f4f7f6; padding:20px; color: #333;}
.container{max-width:1100px; margin:auto; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
h2{text-align:center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;}
input,select,button{padding:10px; margin:5px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;}
button{cursor:pointer; background: #2c3e50; color: white; border: none; font-weight: bold; transition: 0.2s;}

/* Command Bar */
.command-bar { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; }
.btn-danger { background: #e74c3c; }
.btn-success { background: #27ae60; }
.btn-warning { background: #f39c12; }
.btn-info { background: #3498db; }

#ledger { width: 100%; border-collapse: collapse; background: white; }
#ledger th { background: #f8f9fa; position: sticky; top: 85px; z-index: 90; padding: 12px; border-bottom: 2px solid #dee2e6; }
#ledger td { padding: 12px; border-bottom: 1px solid #eee; }
.status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; display: inline-block; text-align: center; }
.bg-red { background: #e74c3c; }
.bg-green { background: #27ae60; }

.live-total-box { text-align: right; font-size: 18px; font-weight: bold; margin: 15px 0; color: #2c3e50; }
#previewOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto; padding: 20px 0; }
.modal-content { background:white; width: 210mm; margin:auto; padding: 20px; border-radius: 8px; }

@media print {
    body * { visibility: hidden; }
    #printSection, #printSection * { visibility: visible; }
    #printSection { position: absolute; top: 0; left: 0; width: 100%; display: block !important; }
}
</style>
</head>
<body>

<div class="container no-print">
    <h2>Petty Cash Cloud Terminal</h2>
    
    <div style="background:#f9f9f9; padding:20px; border-radius:10px; margin-bottom: 30px; border: 1px solid #eee;">
        <h3>Create Voucher</h3>
        <select id="company" style="width: 100%;">
            <option value="Hekayat Attar & Al Oud Perfumes Trading LLC">Hekayat Attar & Al Oud Perfumes Trading LLC</option>
            <option value="Jimmy Aventus FZE">Jimmy Aventus FZE</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="text" id="receivedBy" placeholder="Received By" style="flex:1">
            <input type="text" id="approvedBy" placeholder="Approved By" style="flex:1">
            <select id="initStatus" style="width: 150px;">
                <option value="Pending">Set as Pending</option>
                <option value="Paid">Set as Paid</option>
            </select>
        </div>
        
        <table id="itemsTable" style="width:100%">
            <thead><tr><th style="text-align:left">Description</th><th style="width:20%">Amount (AED)</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <div class="live-total-box">Voucher Total: <span id="liveTotalDisplay">0.00</span> AED</div>
        <button onclick="addRow()" style="background:#7f8c8d">+ Add Line</button>
        <button onclick="generatePreview()" style="background:#27ae60; width: 100%; margin-top: 10px; font-size: 16px;">Preview & Sync to Cloud</button>
    </div>

    <h3>Cloud Ledger</h3>
    <div class="command-bar">
        <button onclick="applyBulkAction('Paid')" class="btn-success">Mark Paid</button>
        <button onclick="applyBulkAction('Pending')" class="btn-warning">Mark Pending</button>
        <button onclick="applyBulkAction('csv')" class="btn-info">Export to Excel (CSV)</button>
        <button onclick="applyBulkAction('delete')" class="btn-danger">Delete</button>
        <div style="margin-left: auto; display: flex; align-items: center;">
            <input type="checkbox" id="selectAll" onclick="toggleAll(this)" style="transform: scale(1.3); margin-right: 8px;"> 
            <span>Select All</span>
        </div>
    </div>

    <table id="ledger"></table>
</div>

<div id="previewOverlay">
    <div style="text-align: center; margin-bottom: 20px;">
        <button style="background:#27ae60; padding: 15px 40px; font-size: 18px;" onclick="finalizeAndPrint()">Confirm & Print</button>
        <button style="background:#95a5a6; padding: 15px 40px; font-size: 18px;" onclick="closePreview()">Cancel</button>
    </div>
    <div id="modalPrintArea" class="modal-content"></div>
</div>
<div id="printSection"></div>

<script>
const companyProfiles = {
    "Hekayat Attar & Al Oud Perfumes Trading LLC": { prefix: "HA", logoFile: "HA.png", address: "Shop 7, Corniche Road, Al Majarrah, Sharjah, UAE" },
    "Jimmy Aventus FZE": { prefix: "JA", logoFile: "JA.png", address: "Q1-006 008B, SAIF Zone, Sharjah, UAE" }
};

function addRow() {
    const tb = document.querySelector("#itemsTable tbody");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><input type="text" class="i-desc" style="width:96%"></td>
                    <td><input type="number" class="i-amt" oninput="updateLiveTotal()" style="width:90%"></td>
                    <td><button onclick="this.parentElement.parentElement.remove(); updateLiveTotal();" style="background:none; color:#e74c3c; font-size:18px;">&times;</button></td>`;
    tb.appendChild(tr);
}

function updateLiveTotal() {
    let t = 0;
    document.querySelectorAll(".i-amt").forEach(i => t += parseFloat(i.value) || 0);
    document.getElementById("liveTotalDisplay").innerText = t.toFixed(2);
}

function generatePreview() {
    let items = [], total = 0;
    document.querySelectorAll("#itemsTable tbody tr").forEach(r => {
        let d = r.querySelector(".i-desc").value;
        let a = parseFloat(r.querySelector(".i-amt").value) || 0;
        if(d) { items.push({desc: d, amount: a}); total += a; }
    });
    if(!items.length) return alert("Add items first.");

    let coName = document.getElementById("company").value;
    let profile = companyProfiles[coName];
    let docNum = profile.prefix + "-" + String(window.counters[profile.prefix]).padStart(4, '0');

    window.currentPendingVoucher = {
        docNo: docNum,
        date: new Date().toLocaleDateString('en-GB'),
        company: coName,
        received: document.getElementById("receivedBy").value,
        approved: document.getElementById("approvedBy").value,
        status: document.getElementById("initStatus").value,
        items: items, total: total, logo: profile.logoFile, address: profile.address
    };

    buildVoucherHTML(window.currentPendingVoucher, "modalPrintArea");
    document.getElementById("previewOverlay").style.display = "block";
}

function buildVoucherHTML(v, targetID) {
    let itemsHTML = v.items.map(item => `<tr><td>${v.date}</td><td>${item.desc}</td><td>${item.amount.toFixed(2)}</td></tr>`).join('');
    document.getElementById(targetID).innerHTML = `
        <div style="display:flex; justify-content:space-between; border-bottom:2px solid #000; padding-bottom:10px;">
            <div><img src="${v.logo}" style="max-height:80px"></div>
            <div style="text-align:right"><b>${v.company}</b><br><small>${v.address}</small></div>
        </div>
        <h2 style="text-align:center; text-decoration:underline">PETTY CASH VOUCHER</h2>
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom: 10px;">
            <div>VOUCHER NO: ${v.docNo}</div><div>DATE: ${v.date}</div>
        </div>
        <table style="width:100%; border-collapse:collapse; margin-top:10px;">
            <thead><tr style="border:1px solid #000; background:#eee">
                <th style="padding:10px; border:1px solid #000;">DATE</th>
                <th style="padding:10px; border:1px solid #000;">DESCRIPTION</th>
                <th style="padding:10px; border:1px solid #000;">AMOUNT (AED)</th>
            </tr></thead>
            <tbody>${itemsHTML.replace(/<td>/g, '<td style="padding:10px; border:1px solid #000;">')}</tbody>
            <tfoot><tr style="font-weight:bold; border:1px solid #000">
                <td colspan="2" style="text-align:right; padding:10px;">TOTAL:</td>
                <td style="padding:10px;">${v.total.toFixed(2)}</td>
            </tr></tfoot>
        </table>
        <div style="margin-top:60px; display:flex; justify-content:space-between;">
            <div style="border-top:2px solid #000; width:220px; text-align:center; padding-top:5px">Received By: ${v.received}</div>
            <div style="border-top:2px solid #000; width:220px; text-align:center; padding-top:5px">Approved By: ${v.approved}</div>
        </div>`;
}

async function finalizeAndPrint() {
    await window.saveToFirebase(window.currentPendingVoucher);
    document.getElementById("printSection").innerHTML = document.getElementById("modalPrintArea").innerHTML;
    window.print();
    location.reload();
}

function renderLedger() {
    const l = document.getElementById("ledger");
    l.innerHTML = `<thead><tr>
        <th style="width:40px">Sel</th>
        <th>Voucher No</th>
        <th>Date</th>
        <th>Total (AED)</th>
        <th>Status</th>
        <th style="text-align:center">Print</th>
    </tr></thead><tbody>`;
    
    window.transactions.slice().reverse().forEach((t) => {
        const color = t.status === 'Pending' ? 'bg-red' : 'bg-green';
        l.innerHTML += `<tr>
            <td><input type="checkbox" class="row-select" value="${t.id}" style="transform: scale(1.2)"></td>
            <td>${t.docNo}</td>
            <td>${t.date}</td>
            <td><b>${t.total.toFixed(2)}</b></td>
            <td><span class="status-pill ${color}">${t.status || 'Paid'}</span></td>
            <td style="text-align:center">
                <button onclick="reprint('${t.id}')" style="background:#34495e; padding:5px 10px;">Print</button>
            </td>
        </tr>`;
    });
    l.innerHTML += "</tbody>";
}

function reprint(id) {
    const t = window.transactions.find(x => x.id === id);
    buildVoucherHTML(t, "printSection");
    window.print();
}

function toggleAll(source) {
    document.querySelectorAll('.row-select').forEach(cb => cb.checked = source.checked);
}

function closePreview() { document.getElementById("previewOverlay").style.display = "none"; }
addRow();
</script>
</body>
</html>
